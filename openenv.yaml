spec_version: 1
name: wallet_rescue_ops
type: space
runtime: fastapi
app: wallet_rescue_ops.server.app:app
port: 7860

tasks:
  - id: trivial_rescue
    name: "Trivial: Already Drained Once"
    description: >-
      A first drain already happened. One malicious approval is still active
      but there are no pending drainers and no look-alikes. Revoke, vault,
      and close.  A warm-up that any agent should ace.
    difficulty: trivial
    seed: 9

  - id: easy_rescue
    name: "Easy: Fake Airdrop Containment"
    description: >-
      A single malicious fake-airdrop approval targets the USDC balance
      alongside a benign DCA approval. Identify the threat, revoke it,
      vault the funds, and close the incident without false positives.
    difficulty: easy
    seed: 0

  - id: medium_rescue
    name: "Medium: Mixed Signal Triage"
    description: >-
      Two approvals with nearly identical names -- one is malicious
      (Jup1ter Rewards), one is a legitimate DCA protocol (Jupiter DCA).
      The agent must investigate before acting, revoke only the threat,
      and protect the wallet without false positives.
    difficulty: medium
    seed: 6

  - id: hard_rescue
    name: "Hard: Post-Compromise Salvage with Pending Drainer"
    description: >-
      Funds already partially drained. A pending malicious transfer races
      against the agent (trigger at step 3). Multiple threat vectors,
      time pressure, and a policy-compliance gate.
    difficulty: hard
    seed: 10

  - id: expert_rescue
    name: "Expert: Market Maker or Drainer"
    description: >-
      Two approvals differ by a single character (Market-Makr vs
      Market-Maker). A queued transaction mirrors the spoofed name.
      Revoking the wrong approval triggers a harsh false-positive penalty.
      The agent must inspect and simulate before acting -- guessing fails.
    difficulty: expert
    seed: 8
